<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fUSD · solvency monitor</title>
<style>
  :root {
    --ink: #0a0d13; --panel: #121823; --panel-2: #0e131c; --line: #1e2735;
    --txt: #d7dee9; --dim: #7d8a9c; --faint: #4c596b;
    --ok: #2ee6a6; --warn: #f6b545; --crit: #ff5f6d; --info: #6ea8fe; --accent: #2ee6a6;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--ink); color: var(--txt); font-family: var(--sans); font-size: 14px; line-height: 1.45; }
  a { color: var(--info); }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 18px 20px 60px; }

  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
  header .brand { font-weight: 700; letter-spacing: .08em; font-size: 13px; text-transform: uppercase; }
  header .brand b { color: var(--accent); }
  header .meta { font-family: var(--mono); font-size: 12px; color: var(--dim); margin-left: auto; display: flex; gap: 16px; flex-wrap: wrap; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--ok); margin-right: 6px; vertical-align: middle; }
  .dot.stale { background: var(--warn); }
  @media (prefers-reduced-motion: no-preference) { .dot { animation: pulse 2s ease-in-out infinite; } }
  @keyframes pulse { 50% { opacity: .35; } }

  /* hero solvency banner — the thesis: is every fUSD backed? */
  .hero { margin: 18px 0; border: 1px solid var(--line); border-radius: 12px; padding: 20px 24px; background:
      linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%); position: relative; overflow: hidden; }
  .hero::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--ok); }
  .hero.bad::before { background: var(--crit); }
  .hero .verdict { font-size: 22px; font-weight: 700; letter-spacing: .02em; display: flex; align-items: center; gap: 12px; }
  .hero.ok .verdict { color: var(--ok); }
  .hero.bad .verdict { color: var(--crit); }
  .hero .sub { color: var(--dim); font-size: 13px; margin-top: 6px; }
  .hero .eq { font-family: var(--mono); margin-top: 14px; font-size: 15px; display: flex; gap: 10px 18px; flex-wrap: wrap; align-items: baseline; }
  .hero .eq b { color: var(--txt); font-weight: 600; }
  .hero .eq .op { color: var(--faint); }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin: 16px 0; }
  .tile { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px; }
  .tile .k { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .tile .v { font-family: var(--mono); font-size: 21px; margin-top: 4px; }
  .tile .v small { font-size: 12px; color: var(--dim); }

  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin: 26px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }

  .alerts .empty { color: var(--ok); font-family: var(--mono); font-size: 13px; }
  .alert { display: flex; gap: 12px; align-items: baseline; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; background: var(--panel); border-left: 3px solid var(--faint); font-size: 13px; }
  .alert.critical { border-left-color: var(--crit); background: #1c1014; }
  .alert.warn { border-left-color: var(--warn); background: #1b1710; }
  .alert.info { border-left-color: var(--info); }
  .alert .sev { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; min-width: 58px; }
  .alert.critical .sev { color: var(--crit); } .alert.warn .sev { color: var(--warn); } .alert.info .sev { color: var(--info); }
  .alert .scope { font-family: var(--mono); color: var(--dim); min-width: 56px; }

  .mkts { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 15px 17px; }
  .card h3 { margin: 0 0 4px; font-family: var(--mono); font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .card h3 .px { margin-left: auto; color: var(--dim); font-size: 12px; font-weight: 400; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 12px; }
  .chip { font-family: var(--mono); font-size: 10px; letter-spacing: .04em; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--dim); }
  .chip.ok { color: var(--ok); border-color: #143a30; } .chip.warn { color: var(--warn); border-color: #3a3014; } .chip.crit { color: var(--crit); border-color: #3a1419; }
  .rows { display: grid; grid-template-columns: 1fr auto; gap: 4px 14px; font-family: var(--mono); font-size: 13px; }
  .rows .lbl { color: var(--dim); } .rows .val { text-align: right; }
  .rows .val.warn { color: var(--warn); } .rows .val.crit { color: var(--crit); } .rows .val.ok { color: var(--ok); }
  .bar { grid-column: 1 / -1; height: 4px; background: var(--panel-2); border-radius: 3px; overflow: hidden; margin: 2px 0 6px; }
  .bar > i { display: block; height: 100%; background: var(--accent); }
  .bar > i.warn { background: var(--warn); } .bar > i.crit { background: var(--crit); }
  .err { color: var(--crit); font-family: var(--mono); font-size: 12px; }
  footer { margin-top: 36px; color: var(--faint); font-size: 11px; font-family: var(--mono); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><b>fUSD</b> · solvency monitor</div>
    <div class="meta" id="meta"></div>
  </header>
  <div id="root"><p style="color:var(--dim);font-family:var(--mono)">connecting…</p></div>
  <footer>read-only · derived from on-chain state · fUSD peg is the redemption floor (no on-chain fUSD/USD oracle) — see oracle freshness for collateral-price health</footer>
</div>

<script>
const POLL_MS = __POLL_MS__;
// append()-based on purpose: string children become TEXT nodes, so RPC/server-derived strings
// (alert messages, market errors) can never inject markup. Pass elements for nested structure.
const $ = (t, c, ...kids) => { const e = document.createElement(t); if (c) e.className = c; e.append(...kids); return e; };
const usd = (n) => n == null ? "—" : "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 2 });
const num = (n, d = 2) => n == null ? "—" : Number(n).toLocaleString("en-US", { maximumFractionDigits: d });
const ago = (ms) => { const s = Math.round((Date.now() - ms) / 1000); return s < 60 ? s + "s ago" : Math.round(s / 60) + "m ago"; };
const short = (k) => k ? k.slice(0, 4) + "…" + k.slice(-4) : "—";

function render(m) {
  const meta = document.getElementById("meta");
  const stale = Date.now() - m.ts > POLL_MS * 3;
  meta.innerHTML = "";
  meta.append(
    $("span", "", $("span", "dot" + (stale ? " stale" : "")), "updated " + ago(m.ts)),
    $("span", "", "slot " + Number(m.slot).toLocaleString("en-US")),
    $("span", "", "RPC " + (m.rpc || "").replace(/^https?:\/\//, "")),
  );

  const root = document.getElementById("root");
  root.innerHTML = "";
  const g = m.global;

  // hero: supply identity. backing must not exceed circulating. The verdict is the SERVER's
  // (computeAlerts) — recomputing it here could contradict the alert list (epsilon/torn-tick rules).
  const broken = m.alerts.some((a) => a.message.startsWith("supply identity broken"));
  const hero = $("div", "hero " + (broken ? "bad" : "ok"));
  hero.append($("div", "verdict", (broken ? "⚠ SUPPLY IDENTITY BROKEN" : "✓ SYSTEM SOLVENT")));
  hero.append($("div", "sub", broken
    ? "Recorded backing exceeds circulating fUSD — investigate immediately."
    : "Circulating fUSD is fully accounted for by recorded debt across monitored markets."));
  const eq = $("div", "eq");
  eq.innerHTML = "circulating <b>" + usd(g.fusdSupplyUsd) + "</b>"
    + '<span class="op">vs backing</span> <b>' + usd(g.sumBackingUsd) + "</b>"
    + '<span class="op">Δ</span> <b>' + usd(g.supplyDeltaUsd) + "</b>"
    + '<span class="op">(Σ agg_debt − unminted + bad_debt)</span>';
  hero.append(eq);
  root.append(hero);

  // KPI tiles
  const totDebt = m.markets.reduce((a, x) => a + (x.aggDebtUsd || 0), 0);
  const totTvl = m.markets.reduce((a, x) => a + (x.tvlUsd || 0), 0);
  const totUnminted = m.markets.reduce((a, x) => a + (x.unmintedUsd || 0), 0);
  const tiles = $("div", "tiles");
  const tile = (k, ...v) => { const t = $("div", "tile"); t.append($("div", "k", k), $("div", "v", ...v)); return t; };
  tiles.append(
    tile("circulating fUSD", usd(g.fusdSupplyUsd)),
    tile("collateral TVL", usd(totTvl)),
    tile("total debt", usd(totDebt)),
    totDebt > 0 ? tile("collateralization", num(totTvl / totDebt * 100, 1), $("small", "", "%")) : tile("collateralization", "—"),
    tile("pending interest", usd(totUnminted)),
    tile("backstop reserve", g.backstop ? usd(g.backstop.balanceUsd) : "—"),
  );
  root.append(tiles);

  // alerts
  root.append($("h2", "", "alerts" + (m.alerts.length ? " · " + m.alerts.length : "")));
  const al = $("div", "alerts");
  if (!m.alerts.length) al.append($("div", "empty", "✓ no active alerts"));
  else m.alerts.forEach((a) => {
    const e = $("div", "alert " + a.severity);
    e.append($("span", "sev", a.severity), $("span", "scope", a.scope), $("span", "msg", a.message));
    al.append(e);
  });
  root.append(al);

  // per-market cards
  root.append($("h2", "", "markets · " + m.markets.length));
  const grid = $("div", "mkts");
  m.markets.forEach((x) => grid.append(card(x, m.thresholds)));
  root.append(grid);
}

function chip(label, cls) { return $("span", "chip " + (cls || ""), label); }

function card(x, th) {
  const c = $("div", "card");
  if (!x.exists) {
    c.append($("h3", "", x.tag), $("div", "err", "not readable: " + (x.error || "missing")));
    return c;
  }
  const h = $("h3", "", x.tag);
  h.append($("span", "px", usd(x.spotUsd) + " · debt " + usd(x.debtSpotUsd)));
  c.append(h);

  const chips = $("div", "chips");
  chips.append(x.shutdown ? chip("SHUTDOWN", "crit") : chip("live", "ok"));
  if (x.mintFrozen) chips.append(chip("mint frozen", "warn")); else chips.append(chip("mint open", "ok"));
  const fresh = x.slotsSincePrice <= th.staleSlots;
  chips.append(chip(fresh ? "price fresh" : "price STALE", fresh ? "ok" : "warn"));
  if (x.badDebtUsd > 0) chips.append(chip("bad debt", "crit"));
  if (x.liqDivergenceActive) chips.append(chip("liq paused: divergence", "warn"));
  if (x.liqGraceActive) chips.append(chip("liq grace", "warn"));
  if (x.guardianPauseActive) chips.append(chip("guardian pause", "warn"));
  c.append(chips);

  const rows = $("div", "rows");
  const row = (lbl, val, cls) => { rows.append($("div", "lbl", lbl), $("div", "val " + (cls || ""), val)); };
  const ceilCls = x.ceilingUsedPct >= th.ceilingWarnPct ? "warn" : "";
  row("debt", usd(x.aggDebtUsd));
  row("TVL", usd(x.tvlUsd));
  const tcrCls = x.tcrBps == null ? "" : (x.scrBps > 0 && x.tcrBps < x.scrBps ? "crit" : (x.ccrBps > 0 && x.tcrBps < x.ccrBps ? "warn" : "ok"));
  row("TCR / MCR", (x.tcrBps == null ? "—" : (x.tcrBps / 100).toFixed(1) + "%") + " / " + (x.mcrBps / 100).toFixed(0) + "%", tcrCls);
  row("avg rate", (x.avgRateBps / 100).toFixed(2) + "%");
  row("ceiling used", x.ceilingUsedPct.toFixed(1) + "%", ceilCls);
  const bar = $("div", "bar"); bar.append($("i", x.ceilingUsedPct >= th.ceilingWarnPct ? "warn" : "", "")); bar.lastChild.style.width = Math.min(100, x.ceilingUsedPct) + "%"; rows.append(bar);
  row("price age", fresh ? x.slotsSincePrice + " slots" : x.slotsSincePrice + " slots", fresh ? "" : "warn");
  row("insurance buffer", usd(x.bufferUsd) + (x.bufferTargetUsd != null ? " / " + usd(x.bufferTargetUsd) : ""), (x.bufferTargetUsd != null && x.bufferUsd < x.bufferTargetUsd) ? "warn" : "");
  row("reactor pool", usd(x.rpDepositsUsd));
  if (x.rpSeizedColl > 0) row("RP seized coll", num(x.rpSeizedColl, 4));
  if (x.rlCapUsd > 0) row("rate limiter", x.rlUsedPct.toFixed(0) + "% of " + usd(x.rlCapUsd), x.rlUsedPct >= 90 ? "warn" : "");
  if (x.protocolCollateral > 0) row("protocol coll (un-homed)", num(x.protocolCollateral, 4), "warn");
  row("unminted interest", usd(x.unmintedUsd));
  c.append(rows);
  return c;
}

async function tick() {
  try {
    const r = await fetch("/metrics.json", { cache: "no-store" });
    if (!r.ok) { document.getElementById("root").innerHTML = '<p class="err">metrics unavailable (' + r.status + ') — monitor still polling…</p>'; return; }
    render(await r.json());
  } catch (e) {
    document.getElementById("meta").innerHTML = '<span class="dot stale"></span>disconnected';
  }
}
tick();
setInterval(tick, Math.max(2000, POLL_MS));
</script>
</body>
</html>
