// Invariant #1 (global supply) — the shared supply-transition functions. Proves each shared
// transition fn in programs/fusd-core/src/supply_transition.rs — the bodies called by every
// supply-touching handler (borrow/repay/refresh_market/liquidate/redeem/urgent_redeem/
// settle_bad_debt) plus the interest-booking twin (accrual::accrue / adjust_rate's fee) — preserves
//     circulating == agg_recorded_debt − unminted_interest + bad_debt.
// The handler CALL SITES are outside these rules' cones — covered by the litesvm mutation oracle
// (mutations.md, class HANDLER). All eight rules are authored, pending a cloud run (mutations.md
// S1–S8): the pre-M-01 replay-the-delta borrow rule was cloud-VERIFIED, and the executed-shared-fn
// rewrite needs a re-run. Each rule models `circulating` as a pure GHOST and EXECUTES the shared
// transition body the handler itself runs at u128, monomorphized to NativeInt.
// This is the "Option 2" path: NO real token CPI, so NO workspace-global [patch.crates-io] spl-token
// (which would corrupt the deployable .so). Pure math-int arithmetic over nondet pre-states, same
// blocker-free regime as the bitmap/absorb rules. Mutation S1 (skip the `cadd` in
// `supply_transition::borrow`) → VIOLATED.
//
//   export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
//   certoraSolanaProver certora/supply.conf            # needs CERTORAKEY; bills your account
//
// prover_args notes: pure math-int (-solanaTACMathInt true), so precise_bitwise_ops is NOT set (no bit
// extraction here). -solanaSkipCallRegInst skips the FusdError Display/fmt indirect callx, irrelevant to
// this pure-state property. NO -solanaCpiAnalysis: this is the ghost path, there is no CPI to analyze.
{
  "msg": "fusd-core 1 - supply identity preserved by the shared supply-transition fns (ghost circulating; handler call sites litesvm-covered)",
  "rule": [
    "supply_preserved_by_borrow_ghost",
    "supply_preserved_by_repay_ghost",
    "supply_preserved_by_refresh_market_ghost",
    "supply_preserved_by_liquidate_ghost",
    "supply_preserved_by_redeem_ghost",
    "supply_preserved_by_urgent_redeem_ghost",
    "supply_preserved_by_settle_bad_debt_ghost",
    "supply_preserved_by_book_interest_ghost"
  ],
  "rule_sanity": "basic",
  "wait_for_results": "all",
  "cargo_tools_version": "v1.53",
  "prover_args": [
    "-solanaOptimisticJoin true",
    "-solanaOptimisticOverlaps true",
    "-solanaOptimisticMemcpyPromotion true",
    "-solanaOptimisticMemcmp true",
    "-solanaOptimisticNoMemmove true",
    "-solanaSkipCallRegInst true",
    "-solanaTACMathInt true"
  ]
}
