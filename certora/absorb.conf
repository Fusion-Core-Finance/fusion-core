// Invariant #3 (liquidation) — the pure-u128 rules over fusd_math::recovery::absorb. These drive the
// EXACT production waterfall split (RP -> redistribution -> local buffer -> global backstop -> un-homed)
// over fully-symbolic u128 inputs; absorb is total (min/sub/add) so they need NO account memory, NO
// symbolic-index array store, NO bitwise ops, NO Anchor Context / token CPI / Clock glue, and NO
// cvlr_assume! pre-state — structurally identical to the cloud-VERIFIED round_trip_smoke.
//
//   absorb_conserves_debt             : reactor + redist + buffer + global + unhomed == debt (nothing stranded)
//   absorb_unhomed_iff_no_tier_covers : strict tier order — a tier fires only after all higher ones drained
//   absorb_unhomed_reachable          : cvlr_satisfy! non-vacuity witness (the un-homed terminal tier is reachable)
//
//   export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
//   certoraSolanaProver certora/absorb.conf                                  # all three rules
//   certoraSolanaProver certora/absorb.conf --rule absorb_conserves_debt     # one rule
//
// prover_args notes: -solanaTACMathInt true gives clean u128 add/sub/min reasoning over the math-int
// domain; -solanaSkipCallRegInst true skips the FusdError Display/fmt indirect callx, irrelevant to the
// verified arithmetic. precise_bitwise_ops is deliberately NOT set — there are zero bitwise ops in absorb,
// so the pure math-int encoding is the right (and tighter) domain.
//
// Mutation L1 (`let unhomed = 0;`, drop the un-homed remainder) flips absorb_conserves_debt to VIOLATED.
// Mutation L3 (reorder the global tier ahead of the local buffer) flips absorb_unhomed_iff_no_tier_covers's
// `global>0 => buffer==buffer_balance` clause to VIOLATED. (See certora/mutations.md.)
{
  "msg": "fusd-core 3 - liquidation conservation and strict tier ordering (recovery::absorb)",
  "rule": ["absorb_conserves_debt", "absorb_unhomed_iff_no_tier_covers", "absorb_unhomed_reachable"],
  "rule_sanity": "basic",
  "wait_for_results": "all",
  "cargo_tools_version": "v1.53",
  "prover_args": [
    "-solanaOptimisticJoin true",
    "-solanaOptimisticOverlaps true",
    "-solanaOptimisticMemcpyPromotion true",
    "-solanaOptimisticMemcmp true",
    "-solanaOptimisticNoMemmove true",
    "-solanaSkipCallRegInst true",
    "-solanaTACMathInt true"
  ]
}
