// Bitmap coupling at a CONCRETE bucket via direct bucket::add_member / remove_member — the cleanest
// bitmap encoding and the strongest shot at Invariant #2(a). It eliminates BOTH known frontier hazards:
//   (1) no symbolic-index store — the touched bucket is the concrete literal 0, so the store/read index
//       and the 1<<(k&63) mask are ALL static (word 0, bit 0);
//   (2) no target()/bucket_of classification arithmetic — add_member/remove_member are called directly.
// VERIFIED recipe (both rules; non-vacuous under mutations B1/B2). See certora.rs §header + README
// §Bitmap-frontier for the full root-cause writeup. Key flags here:
//   - precise_bitwise_ops true: needed for rb::clear's `&= !(1<<k)` AND-complement mask (math-int alone
//     mis-modeled it; add, using `|=`, was fine under math-int, remove was not).
//   - -solanaTACMathInt true: models the bit shifts / BWAnd masks as in Certora's MathEquivTest.
//   - -solanaCvtNondetAccountInfo true: the Anchor flag that applies the precise TAC summary on
//     CVT_nondet_account_info (docs: "For Anchor-based projects, this flag should be true"; otherwise
//     CVT_nondet_account_info is a no-op).
//   - -solanaSkipCallRegInst true: required to process the FusdError Display/fmt indirect callx; the
//     rules' concrete pre-count makes the production checked-arith Err path (also an indirect callx) dead
//     so this flag's stub never havocs the verified state.
//
//   export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
//   certoraSolanaProver certora/bitmap_helper.conf            # needs CERTORAKEY; bills your account
{
  "msg": "fusd-core 2a - bitmap coupling preserved by direct add_member / remove_member (concrete bucket)",
  "rule": [
    "bitmap_coupling_preserved_by_add_member",
    "bitmap_coupling_preserved_by_remove_member"
  ],
  "rule_sanity": "basic",
  "precise_bitwise_ops": true,
  "wait_for_results": "all",
  "cargo_tools_version": "v1.53",
  "prover_args": [
    "-solanaOptimisticJoin true",
    "-solanaOptimisticOverlaps true",
    "-solanaOptimisticMemcpyPromotion true",
    "-solanaOptimisticMemcmp true",
    "-solanaOptimisticNoMemmove true",
    "-solanaSkipCallRegInst true",
    "-solanaTACMathInt true",
    "-solanaCvtNondetAccountInfo true"
  ]
}
