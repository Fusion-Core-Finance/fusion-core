// Round-trip smoke conf — proves the CVLR build -> upload -> verify pipeline end to end on a trivial
// rule BEFORE the real rules. The prover_args + the inlining file (via [package.metadata.certora] in
// programs/fusd-core/Cargo.toml) are REQUIRED for the prover to process the Solana SBF — modeled on
// Certora's TestSolana examples (CeilDivTest etc.). cargo_tools_version v1.53 = rustc 1.89 (clears this
// repo's Solana 2.3 MSRV cascade; see STATE.md / README §Bring-up).
//
//   export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
//   certoraSolanaProver certora/round_trip.conf            # needs CERTORAKEY; bills your account
{
  "msg": "fUSD CVLR round-trip smoke (pipeline check)",
  "rule": ["round_trip_smoke"],
  "rule_sanity": "basic",
  "cargo_tools_version": "v1.53",
  "prover_args": [
    "-solanaOptimisticJoin true",
    "-solanaOptimisticOverlaps true",
    "-solanaOptimisticMemcpyPromotion true",
    "-solanaOptimisticMemcmp true",
    "-solanaOptimisticNoMemmove true"
  ]
}
