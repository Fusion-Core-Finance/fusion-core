// Invariant C1 (LST canonical-rate cap) — the pure-u128 rules over fusd_oracle::aggregate. These drive
// the EXACT production oracle aggregation with a present canonical leg, asserting the collateral
// (mint/LTV) price is bounded by the trustless stake-pool valuation. k_bps = 0 folds the −k·σ haircut
// to 0, so aggregate's collateral price reduces to MIN(market, canonical) — a pure-min u128 property
// in the same blocker-free regime as absorb (no account memory, no bitwise ops, no Anchor Context /
// token CPI / Clock glue, no cvlr_assume! pre-state).
//
//   c1_canonical_caps_collateral       : collateral_price <= canonical (the cap is an UPPER bound)
//   c1_canonical_never_raises_collateral: WITH-canonical collateral <= WITHOUT (the leg only lowers)
//
//   export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
//   certoraSolanaProver certora/c1_canonical.conf                                # both rules
//   certoraSolanaProver certora/c1_canonical.conf --rule c1_canonical_caps_collateral
//
// prover_args notes: identical to absorb.conf — -solanaTACMathInt true gives clean u128 min/sub
// reasoning over the math-int domain; -solanaSkipCallRegInst skips the irrelevant FusdError fmt callx;
// precise_bitwise_ops is deliberately NOT set (zero bitwise ops in this cone with k_bps = 0).
//
// Mutation C1 (drop the cap in aggregate — `Some(c) => chosen.price.min(c)` → `Some(c) =>
// chosen.price`): c1_canonical_caps_collateral flips to VIOLATED when price > c, and
// c1_canonical_never_raises_collateral flips when c > price. (See certora/mutations.md.)
//
// STATUS: both rules VERIFIED on the cloud (non-vacuous per rule_sanity), and both PROD-FN mutation
// flips are cloud-confirmed with the documented asymmetry (mutations.md C1: drop-cap fails only the
// caps rule; min->max fails both; clean tree re-VERIFIED).
{
  "msg": "fusd-core C1 - LST canonical-rate cap on the collateral price (fusd_oracle::aggregate)",
  "rule": ["c1_canonical_caps_collateral", "c1_canonical_never_raises_collateral"],
  "rule_sanity": "basic",
  "wait_for_results": "all",
  "cargo_tools_version": "v1.53",
  "prover_args": [
    "-solanaOptimisticJoin true",
    "-solanaOptimisticOverlaps true",
    "-solanaOptimisticMemcpyPromotion true",
    "-solanaOptimisticMemcmp true",
    "-solanaOptimisticNoMemmove true",
    "-solanaSkipCallRegInst true",
    "-solanaTACMathInt true"
  ]
}
