[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
fusd_core = "FuSiontgYvCc2N2Cinvo5gxSuxt2UfGxKMcbzkB67kud"
fusion_stake_controller = "Fz3z1yh21PQ59smsPjmjeyK6ngh8KoK6PiPxUgCgspFq"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
# solana-test-validator needs ~11s to serve RPC in this environment (WSL2); default 5s is too short.
startup_wait = 40000
